# CI workflow — runs on every push/PR to main
#
# Checks:
#   - Rust: cargo check + clippy + unit tests
#   - Frontend: npm build (Vite)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Rust check + clippy
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          components: clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      # tauri-build panics if dist/ doesn't exist during cargo check
      - name: Create dist placeholder
        run: New-Item -ItemType Directory -Force dist | Out-Null; Set-Content dist/index.html "placeholder"

      - name: cargo check
        run: cargo check -p wmux

      - name: cargo clippy
        run: cargo clippy -p wmux -- -D warnings

      - name: cargo test (unit tests)
        run: cargo test -p wmux

  frontend:
    name: Frontend build
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
