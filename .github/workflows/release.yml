# Release workflow
#
# Triggered by pushing a version tag: git tag v0.2.0 && git push --tags
#
# Steps:
#   1. Build the Tauri app for Windows (x86-64)
#   2. Create a published GitHub Release with the MSI installer attached
#   3. Upload updater metadata for in-app update checks
#
# Secrets required:
#   - TAURI_SIGNING_PRIVATE_KEY
# Optional:
#   - TAURI_SIGNING_PRIVATE_KEY_PASSWORD

name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  release-windows:
    name: Build & release (Windows x64)
    runs-on: windows-latest
    permissions:
      contents: write   # needed to create the GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node.js ──────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # ── Rust ─────────────────────────────────────────────────────────────
      - name: Setup Rust (stable, MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust build cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      # ── Dependencies ─────────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm ci

      - name: Verify updater signing secrets
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "Missing repo secret TAURI_SIGNING_PRIVATE_KEY. Generate a Tauri updater keypair once, then add the private key as a GitHub Actions secret before pushing a release tag."
          }

      # ── Browser helper + CEF runtime ─────────────────────────────────────────
      # Build the out-of-process CEF helper and stage it where tauri.conf.json's
      # externalBinaries / resources expect it.  The helper binary gets the
      # target-triple suffix that Tauri requires for externalBinaries; CEF's
      # runtime DLLs, pak files, and locales go into cef-runtime/ and are
      # installed next to wmux.exe by the MSI (needed because CEF resolves its
      # resources relative to the helper exe's directory).
      - name: Build browser helper and stage CEF runtime
        shell: pwsh
        run: |
          cargo build --package wmux-browser-helper --release

          New-Item -ItemType Directory -Force binaries | Out-Null
          Copy-Item target/release/wmux-browser-helper.exe `
            binaries/wmux-browser-helper-x86_64-pc-windows-msvc.exe -Force

          New-Item -ItemType Directory -Force cef-runtime | Out-Null
          $cef_files = @(
            "wmux-browser-helper-subprocess.exe",
            "chrome_elf.dll", "d3dcompiler_47.dll", "dxcompiler.dll", "dxil.dll",
            "libcef.dll", "libEGL.dll", "libGLESv2.dll",
            "vk_swiftshader.dll", "vulkan-1.dll",
            "icudtl.dat", "vk_swiftshader_icd.json",
            "chrome_100_percent.pak", "chrome_200_percent.pak", "resources.pak"
          )
          foreach ($f in $cef_files) {
            $src = "target/release/$f"
            if (Test-Path $src) { Copy-Item $src "cef-runtime/$f" -Force }
          }
          if (Test-Path target/release/locales) {
            Copy-Item target/release/locales cef-runtime/locales -Recurse -Force
          }

      # ── Build + Release ───────────────────────────────────────────────────
      # tauri-action runs `beforeBuildCommand` (npm run build) automatically,
      # then `cargo tauri build`, then uploads artifacts to a GitHub Release.
      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'wmux ${{ github.ref_name }}'
          releaseBody: |
            ## wmux ${{ github.ref_name }}

            Windows terminal multiplexer — GPU-accelerated, Tauri v2 + ConPTY.

            ### Installing
            Download and run the `.msi` installer below.

            > **Requirements:** Windows 10 1809+ (WebView2 is pre-installed on
            > Windows 11; the installer will prompt to install it on older systems).
          releaseDraft: false     # publish automatically when the tag workflow succeeds
          prerelease: ${{ contains(github.ref_name, '-') }}  # e.g. v1.0.0-beta.1
          includeUpdaterJson: true

      - name: Package portable build
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $portableDir = "target/release/portable"
          $zipPath = "target/release/bundle/portable/wmux_${version}_x64_portable.zip"

          New-Item -ItemType Directory -Force $portableDir | Out-Null
          New-Item -ItemType Directory -Force (Split-Path $zipPath) | Out-Null

          Copy-Item "target/release/wmux.exe" "$portableDir/wmux.exe" -Force
          Copy-Item "README.md" "$portableDir/README.md" -Force
          if (Test-Path "LICENSE") {
            Copy-Item "LICENSE" "$portableDir/LICENSE" -Force
          }

          # Include the CEF browser helper and its runtime files so the
          # portable build can spawn browser panes without an MSI install.
          if (Test-Path "cef-runtime") {
            Copy-Item "cef-runtime/*" "$portableDir/" -Recurse -Force
          }
          if (Test-Path "binaries/wmux-browser-helper-x86_64-pc-windows-msvc.exe") {
            Copy-Item "binaries/wmux-browser-helper-x86_64-pc-windows-msvc.exe" `
              "$portableDir/wmux-browser-helper.exe" -Force
          }

          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Compress-Archive -Path "$portableDir/*" -DestinationPath $zipPath

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wmux-${{ github.ref_name }}-windows
          if-no-files-found: error
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/portable/*.zip
            target/release/wmux.exe
