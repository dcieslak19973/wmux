<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=0.5, maximum-scale=5, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>wmux share</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="xterm.css" />
  <link rel="stylesheet" href="viewer.css" />
  <script src="xterm.js"></script>
  <script src="addon-fit.js"></script>
</head>
<body>
  <header class="topbar">
    <span class="brand">wmux</span>
    <span class="status" id="status">connecting…</span>
    <button class="timeline-toggle" id="timeline-toggle" title="Toggle agent timeline">≡</button>
  </header>
  <div id="viewer-body">
    <main id="term"></main>
    <aside id="agent-timeline" class="agent-timeline">
      <div class="agent-timeline-header">Agent timeline</div>
      <div class="agent-timeline-list" id="agent-timeline-list"></div>
    </aside>
  </div>
  <script type="module" src="viewer.mjs"></script>
</body>
</html>
